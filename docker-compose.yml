version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recetario
    ports:
      - "9787:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      # Opcional: si usas un dominio, agrégalo aquí para que los enlaces absolutos funcionen
      # - APP_URL=https://tudominio.com
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=recetario
      - DB_USERNAME=recetario
      - DB_PASSWORD=recetario_secret
      - APP_KEY=base64:dV61Qe4WY/Kgg75MTyNxfmjIErPKq/ubhZ6FqgKZNiY=
      - LOG_CHANNEL=stack
      - LOG_LEVEL=warning
    volumes:
      - app_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: recetario_mysql
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=recetario
      - MYSQL_USER=recetario
      - MYSQL_PASSWORD=recetario_secret
      - MYSQL_ROOT_PASSWORD=root_secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_data:
  app_logs:
